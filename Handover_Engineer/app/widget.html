<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css">
  <script src="https://static.zohocdn.com/creator/widgets/version/1.0/widgetsdk-min.js"></script>
  <style>
    /* ── Variables ─────────────────────────────────────────── */
    :root {
      --tag-blue     : #0088ff;
      --tag-blue-dk  : #006fcc;
      --border       : #e0e4ea;
      --funnel       : #2fa7ed;

      --pending      : #f9cdcc;
      --pending-border: #e08080;
      --handover     : #fff3cc;
      --handover-border: #f0d000;
      --esn          : #d5e9d4;
      --esn-border   : #5cb85c;

      --text         : #111;
      --text-muted   : #6b7280;
      --bg           : #f4f6fb;
      --card-bg      : #ffffff;
      --shadow       : 0 4px 24px rgba(0,0,0,.08);
      --shadow-hover : 0 8px 32px rgba(0,136,255,.13);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      font-family: "Segoe UI", system-ui, -apple-system, Arial, sans-serif;
      color: var(--text);
      padding: 20px 16px 40px;
      min-height: 100vh;
    }

    /* ── Top user ───────────────────────────────────────────── */
    .top-user {
      display: flex;
      justify-content: flex-end;
      align-items: center;
      gap: 12px;
      margin-bottom: 18px;
    }
    .avatar {
      width: 46px; height: 46px;
      border-radius: 50%;
      background: linear-gradient(135deg, #cfe4ff, #a8d0ff);
      border: 2.5px solid #4d86c6;
      display: grid; place-items: center;
      font-weight: 800; font-size: 15px;
      color: #1a5fa8;
      box-shadow: 0 2px 8px rgba(77,134,198,.25);
      flex-shrink: 0;
    }
    .loc { font-weight: 700; font-size: 15px; color: var(--text-muted); }

    /* ── Card ───────────────────────────────────────────────── */
    .status-card {
      position: relative;
      background: var(--card-bg);
      border: 1.5px solid var(--border);
      border-radius: 20px;
      padding: 22px 18px 18px;
      margin: 28px 0 20px;
      box-shadow: var(--shadow);
      transition: box-shadow .25s ease;
    }
    .status-card:hover { box-shadow: var(--shadow-hover); }

    .card-tag {
      position: absolute;
      top: -18px; left: 16px;
      background: linear-gradient(135deg, #0099ff, #005fcc);
      color: #fff;
      padding: 10px 20px;
      border-radius: 12px;
      font-size: 22px; font-weight: 600; line-height: 1;
      letter-spacing: .3px;
      box-shadow: 0 6px 18px rgba(0,136,255,.35);
    }

    /* ── Filter ─────────────────────────────────────────────── */
    .card-top-right {
      display: flex; justify-content: flex-end;
      align-items: center;
      padding-top: 6px; margin-bottom: 4px;
    }
    .filter-container { position: relative; display: inline-flex; align-items: center; }
    .filter-btn {
      border: none; background: transparent;
      display: inline-flex; align-items: center; gap: 8px;
      cursor: pointer; padding: 6px 10px; border-radius: 10px;
      transition: background .15s;
      -webkit-tap-highlight-color: transparent;
    }
    .filter-btn:hover { background: #f0f4ff; }
    .active-period { font-style: italic; font-size: 18px; color: var(--text-muted); font-weight: 500; }
    .funnel { font-size: 28px; color: var(--funnel); transform: translateY(2px); }

    .filter-dropdown {
      position: absolute; right: 0; top: 38px;
      background: #fff; border-radius: 14px;
      box-shadow: 0 10px 36px rgba(0,0,0,.16);
      display: none; min-width: 245px;
      z-index: 1000; padding: 8px;
      border: 1px solid rgba(0,0,0,.07);
    }
    .filter-dropdown.open { display: block; }

    .filter-option {
      width: 100%; text-align: left;
      border: none; background: transparent;
      padding: 10px 14px; font-size: 14px;
      font-family: inherit; cursor: pointer;
      border-radius: 10px; white-space: nowrap;
      color: var(--text);
      transition: background .12s, color .12s;
    }
    .filter-option:hover { background: #f0f6ff; color: var(--tag-blue); }

    /* Custom date range */
    .custom-range {
      display: none; flex-direction: column;
      gap: 6px; padding: 10px 10px 6px;
      border-top: 1px solid #eee; margin-top: 4px;
    }
    .custom-range.visible { display: flex; }
    .custom-range label {
      font-size: 11px; font-weight: 700;
      color: var(--text-muted);
      text-transform: uppercase; letter-spacing: .6px;
    }
    .custom-range input[type="date"] {
      width: 100%; padding: 7px 10px;
      border: 1.5px solid #dde3ed; border-radius: 9px;
      font-size: 13px; font-family: inherit;
      color: var(--text); background: #f8faff;
      transition: border-color .15s;
    }
    .custom-range input[type="date"]:focus {
      outline: none; border-color: var(--tag-blue); background: #fff;
    }
    .apply-btn-wrap { display: flex; justify-content: flex-end; margin-top: 8px; }
    .apply-btn {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 8px 20px;
      background: linear-gradient(135deg, #0099ff, #005fcc);
      color: #fff; border: none; border-radius: 20px;
      cursor: pointer; font-size: 13px; font-weight: 700;
      font-family: inherit; letter-spacing: .4px;
      box-shadow: 0 3px 10px rgba(0,136,255,.35);
      transition: transform .15s, box-shadow .15s, opacity .15s;
    }
    .apply-btn:hover { transform: translateY(-1px); box-shadow: 0 5px 16px rgba(0,136,255,.45); }
    .apply-btn:active { transform: translateY(0); opacity: .85; }

    /* ── Table head ─────────────────────────────────────────── */
    .table-head {
      display: grid;
      grid-template-columns: 1.3fr .7fr .9fr;
      align-items: center;
      padding: 4px 16px 2px;
      font-size: 20px; font-weight: 600;
      color: var(--text-muted); margin-top: 4px;
    }
    .table-head div:nth-child(2),
    .table-head div:nth-child(3) { text-align: center; }

    /* ── Status rows ────────────────────────────────────────── */
    .status-row {
      display: grid;
      grid-template-columns: 1.3fr .7fr .9fr;
      align-items: center;
      margin: 10px 4px; border-radius: 14px;
      padding: 16px 20px;
      border: 2px solid transparent;
      cursor: pointer;
      transition: transform .15s, box-shadow .15s;
    }
    .status-row:hover { transform: translateY(-2px); box-shadow: 0 4px 16px rgba(0,0,0,.10); }

    .status-label { font-size: 22px; font-weight: 600; line-height: 1.15; }
    .status-calls, .status-spaces {
      text-align: center; font-weight: 900;
      font-size: 34px; letter-spacing: .5px;
      border-left: 1.5px solid rgba(0,0,0,.10);
    }

    .pending  { background: var(--pending);  border-color: var(--pending-border); }
    .handover { background: var(--handover); border-color: var(--handover-border); }
    .esn      { background: var(--esn);      border-color: var(--esn-border); }

    /* Loading pulse */
    @keyframes pulse { 0%,100%{opacity:.3} 50%{opacity:1} }
    .loading-val { animation: pulse 1.4s ease-in-out infinite; color: #aaa; }

    /* ── Responsive ─────────────────────────────────────────── */
    @media (max-width: 420px) {
      .card-tag       { font-size: 18px; padding: 8px 14px; top: -15px; }
      .active-period  { font-size: 16px; }
      .funnel         { font-size: 24px; }
      .table-head     { font-size: 17px; padding: 4px 10px 2px; }
      .status-row     { margin: 8px 2px; padding: 13px 14px; }
      .status-label   { font-size: 18px; }
      .status-calls, .status-spaces { font-size: 28px; }
    }

    /* iOS fixes */
    * { -webkit-tap-highlight-color: transparent; }
    body { -webkit-overflow-scrolling: touch; }
    button, input { -webkit-appearance: none; appearance: none; }
  </style>
</head>
<body>

  <!-- Top user -->
  <div class="top-user">
    <div class="loc" id="userRegion">--</div>
    <div class="avatar" id="userInitials">--</div>
  </div>

  <!-- ══════════ Handovers Card ══════════ -->
  <section class="status-card">
    <div class="card-tag">Handovers</div>

    <div class="card-top-right">
      <div class="filter-container" data-section="ho">
        <button type="button" class="filter-btn">
          <span class="active-period" id="hoPeriodLabel">This month</span>
          <i class="bi bi-funnel-fill funnel"></i>
        </button>
        <div class="filter-dropdown" id="hoFilterDropdown">
          <button type="button" class="filter-option" data-period="this_month">This month</button>
          <button type="button" class="filter-option" data-period="this_quarter">This quarter</button>
          <button type="button" class="filter-option" data-period="last_quarter">Last quarter</button>
          <button type="button" class="filter-option" data-period="this_year">This year (YTD financial year)</button>
          <button type="button" class="filter-option" data-period="custom">Custom date range&hellip;</button>
          <div class="custom-range" id="hoCustomRange">
            <label>From</label>
            <input type="date" id="hoFromDate">
            <label>To</label>
            <input type="date" id="hoToDate">
            <div class="apply-btn-wrap">
              <button type="button" class="apply-btn" onclick="applyCustomRange('ho')">
                <i class="bi bi-check2"></i> Apply
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div class="table-head">
      <div></div>
      <div>Calls</div>
      <div>Spaces</div>
    </div>

    <div class="status-row pending" onclick="navigateToReport('pending', currentHoFrom, currentHoTo)">
      <div class="status-label">Pending<br>Handovers</div>
      <div class="status-calls loading-val" id="hoPendingCalls">…</div>
      <div class="status-spaces loading-val" id="hoPendingSpaces">…</div>
    </div>

    <div class="status-row handover" onclick="navigateToReport('handover_completed', currentHoFrom, currentHoTo)">
      <div class="status-label">Handovers<br>Completed</div>
      <div class="status-calls loading-val" id="hoHandoverCalls">…</div>
      <div class="status-spaces loading-val" id="hoHandoverSpaces">…</div>
    </div>

    <div class="status-row esn" onclick="navigateToReport('esn_completed', currentHoFrom, currentHoTo)">
      <div class="status-label">ESN<br>Completed</div>
      <div class="status-calls loading-val" id="hoEsnCalls">…</div>
      <div class="status-spaces loading-val" id="hoEsnSpaces">…</div>
    </div>
  </section>

  <!-- ══════════ Me Card ══════════ -->
  <section class="status-card">
    <div class="card-tag">Me</div>

    <div class="card-top-right">
      <div class="filter-container" data-section="me">
        <button type="button" class="filter-btn">
          <span class="active-period" id="mePeriodLabel">This month</span>
          <i class="bi bi-funnel-fill funnel"></i>
        </button>
        <div class="filter-dropdown" id="meFilterDropdown">
          <button type="button" class="filter-option" data-period="this_month">This month</button>
          <button type="button" class="filter-option" data-period="this_quarter">This quarter</button>
          <button type="button" class="filter-option" data-period="last_quarter">Last quarter</button>
          <button type="button" class="filter-option" data-period="this_year">This year (YTD financial year)</button>
          <button type="button" class="filter-option" data-period="custom">Custom date range&hellip;</button>
          <div class="custom-range" id="meCustomRange">
            <label>From</label>
            <input type="date" id="meFromDate">
            <label>To</label>
            <input type="date" id="meToDate">
            <div class="apply-btn-wrap">
              <button type="button" class="apply-btn" onclick="applyCustomRange('me')">
                <i class="bi bi-check2"></i> Apply
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div class="status-row handover" style="margin-top:18px;" onclick="navigateToReport('handover_completed', currentMeFrom, currentMeTo)">
      <div class="status-label">Handover<br>Completed</div>
      <div class="status-calls loading-val" id="meHandoverCalls">…</div>
      <div class="status-spaces loading-val" id="meHandoverSpaces">…</div>
    </div>

    <div class="status-row esn" onclick="navigateToReport('esn_completed', currentMeFrom, currentMeTo)">
      <div class="status-label">ESN<br>Completed</div>
      <div class="status-calls loading-val" id="meEsnCalls">…</div>
      <div class="status-spaces loading-val" id="meEsnSpaces">…</div>
    </div>
  </section>

  <script>
    /* ═══════════════════════════════════════════════
       CONFIGURATION
    ═══════════════════════════════════════════════ */
    const applicationName = "service-management";
    const userReport      = "My_Users";
    const HandoverReport  = "Quality_Inspection_Handover_Engineers";
    const EsnReport       = "My_ESN";
    const REPORT_BASE_URL = "https://creatorapp.zoho.in/wohr_parking/environment/development/service-management/#Report:";

    /* ═══════════════════════════════════════════════
       STATE
    ═══════════════════════════════════════════════ */
    let allHandovers      = [];   // raw handover records
    let allEsnRecords     = [];   // raw ESN records

    let currentHoPeriod   = "this_month";
    let currentMePeriod   = "this_month";
    let currentHoFrom     = null;
    let currentHoTo       = null;
    let currentMeFrom     = null;
    let currentMeTo       = null;

    let loginUser         = "";
    let userName          = "";
    let userRouteName     = "";   // New_Route_Name from user profile

    /* ═══════════════════════════════════════════════
       DATE HELPERS  – Added_Time: "02-Mar-2026 16:29:06"
    ═══════════════════════════════════════════════ */
    const MONTH_MAP = { Jan:0,Feb:1,Mar:2,Apr:3,May:4,Jun:5,Jul:6,Aug:7,Sep:8,Oct:9,Nov:10,Dec:11 };
    const MONTH_NAMES = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];

    function parseZohoDate(str) {
      if (!str) return null;
      const [datePart, timePart] = str.split(" ");
      const [dd, mon, yyyy] = datePart.split("-");
      const [hh, mm, ss] = (timePart || "0:0:0").split(":");
      return new Date(+yyyy, MONTH_MAP[mon], +dd, +hh, +mm, +ss);
    }

    function formatZohoDateStr(date) {
      const dd   = String(date.getDate()).padStart(2,"0");
      const mon  = MONTH_NAMES[date.getMonth()];
      const yyyy = date.getFullYear();
      const hh   = String(date.getHours()).padStart(2,"0");
      const mm   = String(date.getMinutes()).padStart(2,"0");
      const ss   = String(date.getSeconds()).padStart(2,"0");
      return `${dd}-${mon}-${yyyy} ${hh}:${mm}:${ss}`;
    }

    function parseDateInput(val, endOfDay = false) {
      if (!val) return null;
      const [y, m, d] = val.split("-").map(Number);
      return endOfDay
        ? new Date(y, m-1, d, 23, 59, 59)
        : new Date(y, m-1, d,  0,  0,  0);
    }

    function getFinancialYear(date) {
      return date.getMonth() >= 3 ? date.getFullYear() : date.getFullYear() - 1;
    }

    function getCurrentFYQuarter(date) {
      const m = date.getMonth(), fy = getFinancialYear(date);
      let q, qStart, qEnd;
      if      (m >= 3 && m <= 5)  { q=1; qStart=new Date(fy,  3,1); qEnd=new Date(fy,  5,30,23,59,59); }
      else if (m >= 6 && m <= 8)  { q=2; qStart=new Date(fy,  6,1); qEnd=new Date(fy,  8,30,23,59,59); }
      else if (m >= 9 && m <= 11) { q=3; qStart=new Date(fy,  9,1); qEnd=new Date(fy, 11,31,23,59,59); }
      else                         { q=4; qStart=new Date(fy+1,0,1); qEnd=new Date(fy+1, 2,31,23,59,59); }
      return { q, qStart, qEnd };
    }

    function getLastFYQuarter(date) {
      const { q } = getCurrentFYQuarter(date);
      const fy = getFinancialYear(date);
      let qStart, qEnd;
      if      (q===1) { qStart=new Date(fy-1,9,1); qEnd=new Date(fy-1,11,31,23,59,59); }
      else if (q===2) { qStart=new Date(fy,  3,1); qEnd=new Date(fy,   5,30,23,59,59); }
      else if (q===3) { qStart=new Date(fy,  6,1); qEnd=new Date(fy,   8,30,23,59,59); }
      else            { qStart=new Date(fy,  9,1); qEnd=new Date(fy,  11,31,23,59,59); }
      return { qStart, qEnd };
    }

    function getDateRange(period, customFrom, customTo) {
      const now = new Date();
      switch (period) {
        case "this_month":
          return { from: new Date(now.getFullYear(), now.getMonth(), 1),
                   to:   new Date(now.getFullYear(), now.getMonth()+1, 0, 23,59,59) };
        case "this_quarter": { const {qStart,qEnd} = getCurrentFYQuarter(now); return {from:qStart, to:qEnd}; }
        case "last_quarter": { const {qStart,qEnd} = getLastFYQuarter(now);    return {from:qStart, to:qEnd}; }
        case "this_year":    { const fy=getFinancialYear(now); return {from:new Date(fy,3,1), to:new Date(fy+1,2,31,23,59,59)}; }
        case "custom":       return { from: customFrom||new Date(0), to: customTo||new Date(9999,11,31) };
        default:             return { from: new Date(0), to: new Date() };
      }
    }

    /* ═══════════════════════════════════════════════
       PAGINATED FETCH HELPER
    ═══════════════════════════════════════════════ */
    async function fetchAllRecords(reportName, criteria) {
      let all = [], page = 1, hasMore = true;
      const pageSize = 200;
      while (hasMore) {
        try {
          const resp = await ZOHO.CREATOR.API.getAllRecords({
            appName: applicationName, reportName, criteria, page, pageSize
          });
          const batch = resp?.data || [];
          all = all.concat(batch);
          hasMore = batch.length === pageSize;
          page++;
        } catch(e) {
          console.error(`Fetch error [${reportName}]:`, e);
          hasMore = false;
        }
      }
      return all;
    }

    /* ═══════════════════════════════════════════════
       AGGREGATE
      Returns buckets: { pending, handoverCompleted, esnCompleted }
      Uses Added_Time for date filtering on handovers.
      ESN records are pre-filtered by route already.
    ═══════════════════════════════════════════════ */
    function aggregateData(handovers, esnRecords, from, to) {

      // ── Build ESN lookup: APS_PS_Parking_Number → count of ESN records ──
      const esnCountMap = {};
      esnRecords.forEach(r => {
        const key = r.APS_PS_Parking_Number;
        if (key) esnCountMap[key] = (esnCountMap[key] || 0) + 1;
      });

      // ── Build ESN Completed lookup: APS_PS_Parking_Number → count where ESN_Status == Completed ──
      const esnCompletedMap = {};
      esnRecords.forEach(r => {
        if (r.ESN_Status === "Completed") {
          const key = r.APS_PS_Parking_Number;
          if (key) esnCompletedMap[key] = (esnCompletedMap[key] || 0) + 1;
        }
      });

      let pending           = { calls:0, spaces:0 };
      let handoverCompleted = { calls:0, spaces:0 };
      let esnCompleted      = { calls:0, spaces:0 };

      handovers.forEach(r => {
        const d = parseZohoDate(r.Added_Time);
        if (!d || d < from || d > to) return;

        const status   = r.Quality_Inspection_Status;
        const parking  = r.APS_PS_Parking_Number;
        const totalQty = parseInt(r.Total_Quantity) || 0;
        const inspQty  = parseInt(r.Inspected_Quantity) || 0;

        // ── Pending Handovers: Partially closed ──
        if (status === "Partially Closed") {
          pending.calls++;
          pending.spaces += inspQty;
        }

        // ── Handover Completed: Closed AND ESN count == Total_Quantity ──
        if (status === "Closed") {
          const esnCount = esnCountMap[parking] || 0;
          if (esnCount === totalQty && totalQty > 0) {
            handoverCompleted.calls++;
            handoverCompleted.spaces += totalQty;
          }
        }
      });

      // ── ESN Completed: ESN_Status == Completed ──
      // Calls = count of completed ESN records
      // Spaces = count of unique APS_PS_Parking_Numbers that are fully completed
      const esnCompletedParkings = new Set();
      esnRecords.forEach(r => {
        if (r.ESN_Status === "Completed") {
          esnCompleted.calls++;
          if (r.APS_PS_Parking_Number) esnCompletedParkings.add(r.APS_PS_Parking_Number);
        }
      });
      esnCompleted.spaces = esnCompletedParkings.size; // unique parking locations completed

      return { pending, handoverCompleted, esnCompleted };
    }

    /* ═══════════════════════════════════════════════
       DOM UPDATERS
    ═══════════════════════════════════════════════ */
    function setVal(id, val) {
      const el = document.getElementById(id);
      if (!el) return;
      el.textContent = val;
      el.classList.remove("loading-val");
    }

    function updateHoCard(agg) {
      setVal("hoPendingCalls",   agg.pending.calls);
      setVal("hoPendingSpaces",  agg.pending.spaces);
      setVal("hoHandoverCalls",  agg.handoverCompleted.calls);
      setVal("hoHandoverSpaces", agg.handoverCompleted.spaces);
      setVal("hoEsnCalls",       agg.esnCompleted.calls);
      setVal("hoEsnSpaces",      agg.esnCompleted.spaces);
    }

    function updateMeCard(agg) {
      setVal("meHandoverCalls",  agg.handoverCompleted.calls);
      setVal("meHandoverSpaces", agg.handoverCompleted.spaces);
      setVal("meEsnCalls",       agg.esnCompleted.calls);
      setVal("meEsnSpaces",      agg.esnCompleted.spaces);
    }

    /* ═══════════════════════════════════════════════
       REFRESH CARDS
    ═══════════════════════════════════════════════ */
    function refreshHoCard(customFrom, customTo) {
      const { from, to } = getDateRange(currentHoPeriod, customFrom, customTo);
      currentHoFrom = from;
      currentHoTo   = to;
      updateHoCard(aggregateData(allHandovers, allEsnRecords, from, to));
    }

    function refreshMeCard(customFrom, customTo) {
      const { from, to } = getDateRange(currentMePeriod, customFrom, customTo);
      currentMeFrom = from;
      currentMeTo   = to;
      updateMeCard(aggregateData(allHandovers, allEsnRecords, from, to));
    }

    /* ═══════════════════════════════════════════════
       CUSTOM RANGE APPLY
    ═══════════════════════════════════════════════ */
    function applyCustomRange(section) {
      if (section === "ho") {
        const from = parseDateInput(document.getElementById("hoFromDate").value);
        const to   = parseDateInput(document.getElementById("hoToDate").value, true);
        if (!from || !to || isNaN(from) || isNaN(to)) { alert("Please select valid dates."); return; }
        currentHoPeriod = "custom";
        document.getElementById("hoPeriodLabel").textContent = "Custom range";
        refreshHoCard(from, to);
      } else {
        const from = parseDateInput(document.getElementById("meFromDate").value);
        const to   = parseDateInput(document.getElementById("meToDate").value, true);
        if (!from || !to || isNaN(from) || isNaN(to)) { alert("Please select valid dates."); return; }
        currentMePeriod = "custom";
        document.getElementById("mePeriodLabel").textContent = "Custom range";
        refreshMeCard(from, to);
      }
      closeAllDropdowns();
    }

    /* ═══════════════════════════════════════════════
       NAVIGATE TO REPORT
    ═══════════════════════════════════════════════ */
    function navigateToReport(type, from, to) {
      if (!from || !to) return;
      const fromStr = formatZohoDateStr(from);
      const toStr   = formatZohoDateStr(to);
      const dateParam = `${fromStr};${toStr}`.replace(/ /g, "%20");
      const nameParam = userName.replace(/ /g, "%20");

      let url = "";

      if (type === "pending") {
        // Pending Handovers → Partially closed records
        url = REPORT_BASE_URL +
          `Quality_Inspection_Handover_Engineers` +
          `?Added_Time=${dateParam}&Added_Time_op=58` +
          `&Handover_Engineer_Name=${nameParam}` +
          `&Quality_Inspection_Status=Partially%20closed`;

      } else if (type === "handover_completed") {
        // Handover Completed → Closed records
        url = REPORT_BASE_URL +
          `Quality_Inspection_Handover_Engineers` +
          `?Added_Time=${dateParam}&Added_Time_op=58` +
          `&Handover_Engineer_Name=${nameParam}` +
          `&Quality_Inspection_Status=Closed`;

      } else if (type === "esn_completed") {
        // ESN Completed → ESN report filtered by route
        url = REPORT_BASE_URL +
          `ESN_Scan_QR_Widget` +
          `?ESN_Status=Completed`;
      }

      console.log("Navigating to:", url);
      ZOHO.CREATOR.UTIL.navigateParentURL({ action: "open", url: url, window: "same" });
    }

    /* ═══════════════════════════════════════════════
       ZOHO INIT + FETCH
    ═══════════════════════════════════════════════ */
    ZOHO.CREATOR.init().then(async () => {
      console.log("Handover Dashboard Running....");

      try {
        const params = ZOHO.CREATOR.UTIL.getInitParams() || {};
        loginUser = params.loginUser || "";

        /* ── Fetch user profile ── */
        const userResp = await ZOHO.CREATOR.API.getAllRecords({
          appName: applicationName, reportName: userReport,
          criteria: `(Email == "${loginUser}")`, page: 1, pageSize: 1
        });
        if (userResp?.data?.length > 0) {
          const u = userResp.data[0];
          userName      = u.Name || "";
          userRouteName = u.New_Route_Name || "";
          document.getElementById("userInitials").textContent =
            userName.split(" ").map(n => n[0]).join("").toUpperCase() || "--";
          document.getElementById("userRegion").textContent = u.Region || "";
        }

        /* ── Fetch Handover records ── */
        allHandovers = await fetchAllRecords(
          HandoverReport,
          `(Handover_Engineer_Email == "${loginUser}")`
        );
        console.log(`Fetched ${allHandovers.length} handover records.`);
        // console.log("Sample records with status:", allHandovers.slice(0, 3).map(r => ({
        //   status: r.Quality_Inspection_Status,
        //   spaces: r.Inspected_Quantity
        // })));

        /* ── Fetch ESN records ── */
        allEsnRecords = await fetchAllRecords(EsnReport, "");
        console.log(`Fetched ${allEsnRecords.length} ESN records.`);


        /* ── Initial render ── */
        refreshHoCard();
        refreshMeCard();

      } catch(e) {
        console.error("Dashboard init error:", e);
      }

    }).catch(e => {
      console.error("ZOHO Init error:", e);
    });

    /* ═══════════════════════════════════════════════
       DROPDOWN INTERACTION
    ═══════════════════════════════════════════════ */
    const PERIOD_LABELS = {
      this_month  : "This month",
      this_quarter: "This quarter",
      last_quarter: "Last quarter",
      this_year   : "This year (YTD)",
      custom      : "Custom range"
    };

    function closeAllDropdowns() {
      document.querySelectorAll(".filter-dropdown.open").forEach(dd => dd.classList.remove("open"));
      document.querySelectorAll(".custom-range.visible").forEach(cr => cr.classList.remove("visible"));
    }

    document.addEventListener("click", (e) => {
      const btn    = e.target.closest(".filter-btn");
      const option = e.target.closest(".filter-option");

      if (option) {
        e.stopPropagation();
        const container = option.closest(".filter-container");
        const section   = container?.dataset.section;  // "ho" or "me"
        const period    = option.dataset.period;
        const label     = container?.querySelector(".active-period");

        if (period === "custom") {
          const cr = document.getElementById(`${section}CustomRange`);
          cr?.classList.toggle("visible");
          if (label) label.textContent = PERIOD_LABELS["custom"];
          return;
        }

        if (label) label.textContent = PERIOD_LABELS[period] || period;
        if (section === "ho") { currentHoPeriod = period; refreshHoCard(); }
        else                  { currentMePeriod = period; refreshMeCard(); }
        closeAllDropdowns();
        return;
      }

      if (btn) {
        e.stopPropagation();
        const container = btn.closest(".filter-container");
        const dd = container?.querySelector(".filter-dropdown");
        if (!dd) return;
        const isOpen = dd.classList.contains("open");
        closeAllDropdowns();
        if (!isOpen) dd.classList.add("open");
        return;
      }

      if (!e.target.closest(".filter-dropdown")) closeAllDropdowns();
    });
  </script>
</body>
</html>
