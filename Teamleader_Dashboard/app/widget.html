  <style>
    :root{--brand:#1f66ff;}*,*::before,*::after{box-sizing:border-box;}html,body{height:100%;margin:0;}

    .cd-yellow{background:#ffe65b;}.cd-orange{background:#ff4b1f;color:#111;}.cd-green{background:#d7f1d3;}.cd-blue{background:#cfe0ff;}
    .cd-pill{border:1px solid rgba(0,0,0,.18);border-radius:10px;background:#fff;padding:8px 10px;display:flex;align-items:center;justify-content:space-between;gap:10px;min-height:44px;}
    .cd-pill--block{width:100%;}

    .cd-pill-v{font-size:22px;font-weight:900;line-height:1;color:cornflowerblue;cursor:pointer;}
    .cd-breakdown{margin-top:6px;}
    .cd-breakdown-row{display:grid;grid-template-columns:1.2fr 1fr 1fr;gap:10px;align-items:center;}
    .cd-label{font-weight:700;color:#222;padding-left:2px;}
    .cd-label--center{display:flex;align-items:center;justify-content:center;font-weight:800;color:#333;}
    .cd-divider{height:2px;background:rgba(0,0,0,.20);margin:12px 0;border-radius:999px;}
    .cd-matrix{display:grid;grid-template-columns:1.2fr 1fr 1fr;gap:10px;align-items:center;}
    .cd-pie-wrap{display:flex;justify-content:center;align-items:center;width:78px;height:78px;} */
    #pmPieCanvas{width:78px;height:78px;display:block;}
    .cd-stack{display:flex;flex-direction:column;gap:10px;}
    /* Loader */
    #loader{display:none;position:fixed;inset:0;z-index:9999;background-color:rgba(0,0,0,.45);text-align:center;}
    #loader .loader-wrap{width:200px;height:200px;position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);filter:url(#goo);animation:rotate-move 2s ease-in-out infinite;}
    #loader .dot{width:70px;height:70px;border-radius:50%;position:absolute;top:0;bottom:0;left:0;right:0;margin:auto;}
    #loader .dot-3{background-color:#f74d75;animation:dot-3-move 2s ease infinite,z-idx 6s ease infinite;}
    #loader .dot-2{background-color:#10beae;animation:dot-2-move 2s ease infinite,z-idx 6s -4s ease infinite;}
    #loader .dot-1{background-color:#ffe386;animation:dot-1-move 2s ease infinite,z-idx 6s -2s ease infinite;}
    #loader svg{position:absolute;width:0;height:0;}
    @keyframes dot-3-move{20%{transform:scale(1)}45%{transform:translateY(-18px) scale(.45)}60%{transform:translateY(-90px) scale(.45)}80%{transform:translateY(-90px) scale(.45)}100%{transform:translateY(0) scale(1)}}
    @keyframes dot-2-move{20%{transform:scale(1)}45%{transform:translate(-16px,12px) scale(.45)}60%{transform:translate(-80px,60px) scale(.45)}80%{transform:translate(-80px,60px) scale(.45)}100%{transform:translateY(0) scale(1)}}
    @keyframes dot-1-move{20%{transform:scale(1)}45%{transform:translate(16px,12px) scale(.45)}60%{transform:translate(80px,60px) scale(.45)}80%{transform:translate(80px,60px) scale(.45)}100%{transform:translateY(0) scale(1)}}
    @keyframes rotate-move{55%{transform:translate(-50%,-50%) rotate(0deg)}80%{transform:translate(-50%,-50%) rotate(360deg)}100%{transform:translate(-50%,-50%) rotate(360deg)}}
    @keyframes z-idx{0%,100%{z-index:3}33.3%{z-index:2}66.6%{z-index:1}}
    /* Modal */
    #filterBackdrop{display:none;position:fixed;inset:0;z-index:1050;background:#000;opacity:.5;}
    #filterBackdrop.show{display:block;}
    #filterModal{display:none;position:fixed;inset:0;z-index:1055;overflow:auto;padding:18px 12px;}

    .filter-field label{display:block;font-weight:700;font-size:13px;margin-bottom:5px;}
    .filter-field select,.filter-field input{width:100%;padding:9px 10px;border:1px solid rgba(0,0,0,.2);border-radius:8px;outline:none;background:#fff;font-size:13px;font-family:inherit;}

    .btn-primary{background:#1f66ff;border-color:#1f66ff;color:#fff;}

    .btn-close::before,.btn-close::after{content:"";position:absolute;top:50%;left:50%;width:18px;height:2px;background:#333;transform-origin:center;}

    .btn-close::after{transform:translate(-50%,-50%) rotate(-45deg);}
    body.modal-open{overflow:hidden !important;}

    .sugg-item{padding:10px 12px;cursor:pointer;font-size:14px;}

    @media(max-width:720px){.cd-row-3{grid-template-columns:1fr}.cd-row-4{grid-template-columns:repeat(2,1fr)}}
    @media(max-width:420px){.cd-breakdown-row,.cd-matrix{grid-template-columns:1fr;text-align:left}.cd-label--center{justify-content:flex-start}.cd-stack{width:100%}}

  <!-- Filter Modal -->

  <script>
    /* ═══════════════════════════════════════════════════════════
       CONFIGURATION
    ═══════════════════════════════════════════════════════════ */
    let UserName     = "";
    let userID       = "";
    let currentRole  = "";
    let currentRoute = "";

    const applicationName = "service-management";
    const userReport      = "My_Users";
    const serviceReport   = "Scan_QR_Service_Request";
    const ESNReport       = "ESN_Scan_QR_Widget";
    const REPORT_BASE_URL = "https://creatorapp.zoho.in/wohr_parking/environment/development/service-management/#Report:";

    /* ═══════════════════════════════════════════════════════════
       ROUTE EXPANSION MAP
       ─────────────────────────────────────────────────────────
       When a supervisor is assigned a region alias as their
       route (e.g. "Pune All"), we must expand it to the real
       individual Route_Name values that exist in the records.

       Used in:
         routeCrit()       → OR-expanded criteria string
         routeParamValue() → bracket list for report URLs
    ═══════════════════════════════════════════════════════════ */
    const ROUTE_EXPANSION = {
      "Pune All"            : ["Pune 1", "Pune 2", "Pune 3"],
      "All Mumbai Region"   : ["Mumbai Western 1", "Mumbai Western 2", "Mumbai Western 3",
                               "Mumbai Central 4", "Mumbai Central 5", "Mumbai Central 6",
                               "Mumbai Harbour 7"],
      "All North Region"    : ["North 1", "North 2", "North 3", "North 4", "North 5", "North 6"],
      "All Hyderabad"       : ["Hyderabad 1", "Hyderabad 2", "Hyderabad 3"],
      "All Chennai"         : ["Chennai 1", "Chennai 2"],
      "All Bangalore Region": ["Bangalore 1", "Bangalore 2", "Bangalore 3", "Bangalore 4",
                               "Bangalore 5", "Bangalore 6", "Bangalore 7"],
      "All Ahmedabad"       : ["Ahmedabad 1", "Ahmedabad 2"],
    };

    /* Period state — one per section */
    const periodOther = { period:"this_month", from:null, to:null };
    const periodEsn   = { period:"this_month", from:null, to:null };
    const periodMe    = { period:"this_month", from:null, to:null };
    let activeFilterTarget = "other";

    $(document).ready(function () {

      /* ─────────────────────────────────────────────────────────
         DATE HELPERS
      ───────────────────────────────────────────────────────── */
      const MONTHS = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
      function startOfDay(d){ return new Date(d.getFullYear(), d.getMonth(), d.getDate(), 0, 0, 0); }
      function endOfDay(d)  { return new Date(d.getFullYear(), d.getMonth(), d.getDate(), 23, 59, 59); }
      function getFYStartYear(r){ return (r.getMonth() >= 3) ? r.getFullYear() : r.getFullYear() - 1; }
      function quarterStart(ref){
        const m = ref.getMonth();
        let qs = 0;
        if (m >= 3 && m <= 5) qs = 3;
        else if (m >= 6 && m <= 8) qs = 6;
        else if (m >= 9 && m <= 11) qs = 9;
        return new Date(ref.getFullYear(), qs, 1);
      }
      function getRangeFromState(state){
        const now = new Date();
        if (state.period === "custom" && state.from && state.to)
          return { from: startOfDay(state.from), to: endOfDay(state.to) };
        if (state.period === "this_month")
          return { from: startOfDay(new Date(now.getFullYear(), now.getMonth(), 1)),
                   to:   endOfDay(new Date(now.getFullYear(), now.getMonth() + 1, 0)) };
        if (state.period === "this_year") {
          const fy = getFYStartYear(now);
          return { from: startOfDay(new Date(fy, 3, 1)), to: endOfDay(new Date(fy + 1, 3, 0)) };
        }
        if (state.period === "this_quarter" || state.period === "last_quarter") {
          const qS = quarterStart(now);
          const off = (state.period === "last_quarter") ? -3 : 0;
          const from = new Date(qS.getFullYear(), qS.getMonth() + off, 1);
          const to   = new Date(from.getFullYear(), from.getMonth() + 3, 0);
          return { from: startOfDay(from), to: endOfDay(to) };
        }
        return { from: startOfDay(new Date(now.getFullYear(), now.getMonth(), 1)),
                 to:   endOfDay(new Date(now.getFullYear(), now.getMonth() + 1, 0)) };
      }
      function fmtDate(d){
        return `${String(d.getDate()).padStart(2,"0")}-${MONTHS[d.getMonth()]}-${d.getFullYear()}`;
      }
      function fmtDateTime(d){
        return `${fmtDate(d)} ${String(d.getHours()).padStart(2,"0")}:${String(d.getMinutes()).padStart(2,"0")}:${String(d.getSeconds()).padStart(2,"0")}`;
      }
      function toInputDate(d){
        if (!d) return "";
        return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
      }
      function parseInputDate(val){
        if (!val) return null;
        const [y,m,d] = val.split("-").map(Number);
        return new Date(y, m-1, d);
      }
      function dueDateRangeCrit(s){
        const r = getRangeFromState(s);
        return `Due_Date >= "${fmtDate(r.from)}" && Due_Date <= "${fmtDate(r.to)}"`;
      }
      function addedTimeRangeCrit(s){
        const r = getRangeFromState(s);
        return `Added_Time >= "${fmtDateTime(r.from)}" && Added_Time <= "${fmtDateTime(r.to)}"`;
      }
      function closedDateRangeCrit_ME(s){
        const r = getRangeFromState(s);
        return `Closed_Date >= "${fmtDate(r.from)}" && Closed_Date <= "${fmtDate(r.to)}"`;
      }
      function labelForState(state){
        if (state.period === "custom" && state.from && state.to) {
          const r = getRangeFromState(state);
          return `${fmtDate(r.from)} – ${fmtDate(r.to)}`;
        }
        return { this_month:"This month", this_quarter:"This quarter",
                 last_quarter:"Last quarter", this_year:"This year" }[state.period] || "This month";
      }
      function getState(t){ return t==="esn" ? periodEsn : t==="me" ? periodMe : periodOther; }
      function setLabelForSection(t){
        const txt = labelForState(getState(t));
        if (t==="other") $("#otherPeriodLabel").text(txt);
        if (t==="esn")   $("#esnPeriodLabel").text(txt);
        if (t==="me")    $("#mePeriodLabel").text(txt);
      }

      /* ─────────────────────────────────────────────────────────
         ROUTE HELPERS
         ─────────────────────────────────────────────────────────
         routeCrit() expands group aliases into OR conditions:
           "Pune All" → (Route_Name == "Pune 1" || Route_Name == "Pune 2" || Route_Name == "Pune 3")
           "Pune 1"   → Route_Name == "Pune 1"   (unchanged)

         routeParamValue() for report URLs:
           "Pune All" → [Pune 1,Pune 2,Pune 3]
           "Pune 1"   → Pune 1
      ───────────────────────────────────────────────────────── */
      function esc(s){ return String(s || "").replace(/"/g, '\\"'); }

      function routeCrit(){
        const routes = ROUTE_EXPANSION[currentRoute];
        if (routes && routes.length) {
          return "(" + routes.map(r => `Route_Name == "${esc(r)}"`).join(" || ") + ")";
        }
        return `Route_Name == "${esc(currentRoute)}"`;
      }

      function routeParamValue(){
        const routes = ROUTE_EXPANSION[currentRoute];
        if (routes && routes.length) return `[${routes.join(",")}]`;
        return fullyDecode(currentRoute);
      }

      /* ─────────────────────────────────────────────────────────
         CRITERIA BUILDERS
         KEY CHANGE vs ST: Supervisior_Name.ID  (not Service_Technician_Name.ID)
         Route:            uses routeCrit() — OR-expanded when group alias
      ───────────────────────────────────────────────────────── */
      // For Service Report (has Route_Name field)
      function baseCrit(extra){
        const base = `Supervisior_Name.ID == ${userID} && ${routeCrit()}`;
        return extra ? `(${base} && ${extra})` : `(${base})`;
      }

      // For ESN Report (no Route_Name field)
      function baseCritESN(extra){
        const base = `Supervisor_Name.ID == ${userID} && ${routeCrit()}`;
        return extra ? `(${base} && ${extra})` : `(${base})`;
      }



      // Me section — no Supervisior_Name, Closed_Owner used separately
      function routeOnlyCrit(extra){
        return extra ? `(${routeCrit()} && ${extra})` : `(${routeCrit()})`;
      }

      /* ─────────────────────────────────────────────────────────
         URL / REPORT HELPERS
         KEY CHANGE vs ST: Supervisior_Name param (not Service_Technician_Name)
      ───────────────────────────────────────────────────────── */
      const OP_BETWEEN = 58, OP_NOT_EQ = 19;

      function fullyDecode(str){
        let out = String(str ?? "");
        for (let i = 0; i < 10; i++){
          if (!/%[0-9A-Fa-f]{2}/.test(out)) break;
          try { const dec = decodeURIComponent(out); if (dec === out) break; out = dec; } catch(e){ break; }
        }
        return out;
      }
      function buildQueryRaw(params){
        return Object.keys(params || {})
          .filter(k => params[k] !== undefined && params[k] !== null && params[k] !== "")
          .map(k => k + "=" + String(params[k])).join("&");
      }
      function openReport(reportName, params){
        const qs  = buildQueryRaw(params);
        const url = REPORT_BASE_URL + reportName + (qs ? "?" + qs : "");
        ZOHO.CREATOR.UTIL.navigateParentURL({ action:"open", url, window:"same" });
      }
      function addBetween(p, field, f, t){ p[field] = `${f};${t}`; p[field+"_op"] = OP_BETWEEN; }
      function addDueBetween(p, s)    { const r=getRangeFromState(s); addBetween(p,"Due_Date",    fmtDate(r.from),     fmtDate(r.to)); }
      function addAddedBetween(p, s)  { const r=getRangeFromState(s); addBetween(p,"Added_Time",  fmtDateTime(r.from), fmtDateTime(r.to)); }
      function addClosedBetween_ME(p,s){ const r=getRangeFromState(s); addBetween(p,"Closed_Date", fmtDate(r.from),     fmtDate(r.to)); }

      // Other Calls / ESN → Supervisior_Name + expanded route list
      function baseParams(){   return { Route_Name: routeParamValue(), Supervisior_Name: `[${UserName}]` }; }
      // Me Brkdwn/PM/Other → route only (Closed_Owner applied separately)
      function baseParamsMe(){ return { Route_Name: routeParamValue() }; }

      function setCount(sel, val){ $(sel).text(val == null ? "0" : String(val)); }

      /* ─────────────────────────────────────────────────────────
         CLICK REDIRECTS
      ───────────────────────────────────────────────────────── */
      function bindCountRedirects(){
        $("#BreakdownAll").off("click.r").on("click.r", ()=>{
          const p=baseParams(); p.Service_Request_Type="Breakdown"; p.Status="Closed"; p.Status_op=OP_NOT_EQ;
          addDueBetween(p,periodOther); openReport("Breakdown_Calls",p);
        });
        $("#BreakdownClosed").off("click.r").on("click.r", ()=>{
          const p=baseParams(); p.Service_Request_Type="Breakdown"; p.Status="Closed";
          addDueBetween(p,periodOther); openReport("Breakdown_Calls",p);
        });
        $("#PmAll").off("click.r").on("click.r", ()=>{
          const p=baseParams(); p.Service_Request_Type="Routine"; p.Status="Current month due";
          addDueBetween(p,periodOther); openReport("Open_User_Service_Request",p);
        });
        $("#PmClosed").off("click.r").on("click.r", ()=>{
          const p=baseParams(); p.Service_Request_Type="Routine"; p.Status="Closed";
          addDueBetween(p,periodOther); openReport("Closed_User_Service_Request",p);
        });
        $("#PmOverdue").off("click.r").on("click.r", ()=>{
          const p=baseParams(); p.Service_Request_Type="Routine"; p.Status="Overdue";
          openReport("Open_User_Service_Request",p);
        });
        $("#otherActive").off("click.r").on("click.r", ()=>{
          const p=baseParams(); p.Status="Closed"; p.Status_op=OP_NOT_EQ;
          p.Service_Request_Type="[One Time Service,Repair,Inspection]"; p.Service_Request_Type_op=26;
          addDueBetween(p,periodOther); openReport("Open_User_Service_Request",p);
        });
        $("#otherClosed").off("click.r").on("click.r", ()=>{
          const p=baseParams(); p.Status="Closed";
          p.Service_Request_Type="[One Time Service,Repair,Inspection]"; p.Service_Request_Type_op=26;
          addDueBetween(p,periodOther); openReport("Closed_User_Service_Request",p);
        });
        $("#esnPending").off("click.r").on("click.r", ()=>{
          const p=baseParams(); p.ESN_Status="Pending"; openReport("My_ESN",p);
        });
        $("#esnCompleted").off("click.r").on("click.r", ()=>{
          const p=baseParams(); p.ESN_Status="Completed";
          addAddedBetween(p,periodEsn); openReport("My_ESN",p);
        });
        // Me — Brkdwn/PM/Other use Closed_Owner, date-only Closed_Date
        $("#meBrkdwn").off("click.r").on("click.r", ()=>{
          const p=baseParamsMe(); p.Service_Request_Type="Breakdown"; p.Status="Closed";
          p.Closed_Owner=`[${UserName}]`; addClosedBetween_ME(p,periodMe); openReport("Breakdown_Calls",p);
        });
        $("#mePm").off("click.r").on("click.r", ()=>{
          const p=baseParamsMe(); p.Service_Request_Type="Routine"; p.Status="Closed";
          p.Closed_Owner=`[${UserName}]`; addClosedBetween_ME(p,periodMe); openReport("Closed_User_Service_Request",p);
        });
        $("#meOther").off("click.r").on("click.r", ()=>{
          const p=baseParamsMe(); p.Service_Request_Type="[One Time Service,Repair,Inspection]";
          p.Service_Request_Type_op=26; p.Status="Closed";
          p.Closed_Owner=`[${UserName}]`; addClosedBetween_ME(p,periodMe); openReport("Closed_User_Service_Request",p);
        });
        // Me ESN uses Supervisior_Name (via baseParams)
        $("#meEsn").off("click.r").on("click.r", ()=>{
          const p=baseParams(); p.ESN_Status="Completed";
          addAddedBetween(p,periodMe); openReport("My_ESN",p);
        });
      }

      /* ─────────────────────────────────────────────────────────
         PM PIE CHART
      ───────────────────────────────────────────────────────── */
      let pmAll=0, pmClosed=0, pmOverdue=0, pmChart=null;
      Chart.register(ChartDataLabels);
      const PM_EMPTY = [0,0,1];
      const pmNoDataPlugin = { id:"pmNoDataFlag", beforeInit(c){ c.$noData=true; } };

      function initPMPieChart(){
        const canvas = document.getElementById("pmPieCanvas");
        if (!canvas) return;
        if (pmChart){ pmChart.destroy(); pmChart=null; }
        pmChart = new Chart(canvas.getContext("2d"), {
          type:"doughnut", plugins:[pmNoDataPlugin],
          data:{ labels:["Closed","Overdue","All"],
            datasets:[{ data:PM_EMPTY.slice(), backgroundColor:["#e5e7eb","#e5e7eb","#e5e7eb"], borderWidth:2, borderColor:"#fff", hoverOffset:6 }]
          },
          options:{ 
            responsive:false, maintainAspectRatio:false, cutout:"58%",
            plugins:{ legend:{ display:false },
              tooltip:{ enabled:true, callbacks:{ label(ctx){
                if(ctx.chart.$noData) return ` ${ctx.label}: 0 (0%)`;
                const total = ctx.dataset.data.reduce((a,b)=>a+b,0)||0;
                const v = Number(ctx.raw||0);
                return ` ${ctx.label}: ${v} (${total ? Math.round(v/total*100) : 0}%)`;
              }}},
              datalabels:{ display(ctx){
                if(ctx.chart.$noData) return ctx.dataIndex===2;
                return (ctx.dataset.data[ctx.dataIndex]||0)>0;
              }, color:"#fff", font:{weight:"800",size:9},
              textStrokeColor:"rgba(0,0,0,.35)", textStrokeWidth:2,
              formatter(v,ctx){
                if(ctx.chart.$noData) return ctx.chart.data.labels[ctx.dataIndex]+"\n0";
                return ctx.chart.data.labels[ctx.dataIndex]+"\n"+v;
              }}
            }
          }
        });
      }
      function updatePMPieChart(all, closed, overdue){
        all=Number(all||0); closed=Number(closed||0); overdue=Number(overdue||0);
        if (!pmChart) initPMPieChart();
        if (!pmChart) return;
        const has = all||closed||overdue;
        pmChart.$noData = !has;
        pmChart.data.datasets[0].data = has ? [closed,overdue,all] : PM_EMPTY.slice();
        pmChart.data.datasets[0].backgroundColor = has ? ["#22c55e","#ef4444","#8b5cf6"] : ["#e5e7eb","#e5e7eb","#e5e7eb"];
        pmChart.update();
      }

      /* ─────────────────────────────────────────────────────────
         SEQUENTIAL DATA LOADERS
         All criteria use baseCrit() → Supervisior_Name.ID + routeCrit()
         routeCrit() auto-expands group aliases to OR conditions
      ───────────────────────────────────────────────────────── */
      function refreshOnly(target){
        $("#loader").show();
        const done = ()=>{ bindCountRedirects(); $("#loader").hide(); };
        if (target==="other")    refreshOtherCalls(done);
        else if(target==="esn")  refreshESN(done);
        else                     refreshMe(done);
      }

      /* Other Calls */
      function refreshOtherCalls(done){ setLabelForSection("other"); Other_BreakdownAll(done); }

      function Other_BreakdownAll(done){
        const c = baseCrit(`Service_Request_Type=="Breakdown" && Status!="Closed" && ${dueDateRangeCrit(periodOther)}`);
        console.log("criteria:", c);
        ZOHO.CREATOR.API.getRecordCount({appName:applicationName, reportName:serviceReport, criteria:c})
          .then(r=>{setCount("#BreakdownAll",r.result.records_count); Other_BreakdownClosed(done); })
          .catch(()=>Other_BreakdownClosed(done));
      }
      function Other_BreakdownClosed(done){
        ZOHO.CREATOR.API.getRecordCount({appName:applicationName, reportName:serviceReport,
          criteria:baseCrit(`Service_Request_Type=="Breakdown" && Status=="Closed" && ${dueDateRangeCrit(periodOther)}`)})
          .then(r=>{ setCount("#BreakdownClosed",r.result.records_count); Other_PMAll(done); })
          .catch(()=>Other_PMAll(done));
      }
      function Other_PMAll(done){
        ZOHO.CREATOR.API.getRecordCount({appName:applicationName, reportName:serviceReport,
          criteria:baseCrit(`Service_Request_Type=="Routine" && Status=="Current month due" && ${dueDateRangeCrit(periodOther)}`)})
          .then(r=>{ pmAll=Number(r.result.records_count||0); setCount("#PmAll",pmAll); Other_PMOverdue(done); })
          .catch(()=>{ pmAll=0; setCount("#PmAll",0); Other_PMOverdue(done); });
      }
      function Other_PMOverdue(done){
        ZOHO.CREATOR.API.getRecordCount({appName:applicationName, reportName:serviceReport,
          criteria:baseCrit(`Service_Request_Type=="Routine" && Status=="Overdue"`)})
          .then(r=>{ pmOverdue=Number(r.result.records_count||0); setCount("#PmOverdue",pmOverdue); Other_PMClosed(done); })
          .catch(()=>{ pmOverdue=0; setCount("#PmOverdue",0); Other_PMClosed(done); });
      }
      function Other_PMClosed(done){
        ZOHO.CREATOR.API.getRecordCount({appName:applicationName, reportName:serviceReport,
          criteria:baseCrit(`Service_Request_Type=="Routine" && Status=="Closed" && ${dueDateRangeCrit(periodOther)}`)})
          .then(r=>{ pmClosed=Number(r.result.records_count||0); setCount("#PmClosed",pmClosed); updatePMPieChart(pmAll,pmClosed,pmOverdue); Other_OtherActive(done); })
          .catch(()=>{ pmClosed=0; setCount("#PmClosed",0); updatePMPieChart(pmAll,pmClosed,pmOverdue); Other_OtherActive(done); });
      }
      function Other_OtherActive(done){
        ZOHO.CREATOR.API.getRecordCount({appName:applicationName, reportName:serviceReport,
          criteria:baseCrit(`Service_Request_Type!="Routine" && Service_Request_Type!="Breakdown" && Status!="Closed" && ${dueDateRangeCrit(periodOther)}`)})
          .then(r=>{ setCount("#otherActive",r.result.records_count); Other_OtherClosed(done); })
          .catch(()=>Other_OtherClosed(done));
      }
      function Other_OtherClosed(done){
        ZOHO.CREATOR.API.getRecordCount({appName:applicationName, reportName:serviceReport,
          criteria:baseCrit(`Service_Request_Type!="Routine" && Service_Request_Type!="Breakdown" && Status=="Closed" && ${dueDateRangeCrit(periodOther)}`)})
          .then(r=>{ setCount("#otherClosed",r.result.records_count); if(done)done(); })
          .catch(()=>{ if(done)done(); });
      }

      /* ESN */
      function refreshESN(done){ setLabelForSection("esn"); ESN_Pending(done); }
      function ESN_Pending(done){
        const c = baseCritESN(`ESN_Status=="Pending"`);
        console.log("criteria:", c);
        ZOHO.CREATOR.API.getRecordCount({appName:applicationName, reportName:ESNReport,
          criteria:baseCritESN(`ESN_Status=="Pending"`)})
          .then(r=>{console.log("Count:", r.result.records_count); setCount("#esnPending",r.result.records_count); ESN_Completed(done); })
          .catch(()=>ESN_Completed(done));
      }

      function ESN_Completed(done){
        ZOHO.CREATOR.API.getRecordCount({appName:applicationName, reportName:ESNReport,
          criteria:baseCritESN(`ESN_Status=="Completed" && ${addedTimeRangeCrit(periodEsn)}`)})
          .then(r=>{ setCount("#esnCompleted",r.result.records_count); if(done)done(); })
          .catch(()=>{ if(done)done(); });
      }

      /* Me */
      function refreshMe(done){ setLabelForSection("me"); Me_Breakdown(done); }
      function Me_Breakdown(done){
        ZOHO.CREATOR.API.getRecordCount({appName:applicationName, reportName:serviceReport,
          criteria:routeOnlyCrit(`Service_Request_Type=="Breakdown" && Status=="Closed" && Closed_Owner.ID==${userID} && ${closedDateRangeCrit_ME(periodMe)}`)})
          .then(r=>{ setCount("#meBrkdwn",r.result.records_count); Me_PM(done); })
          .catch(()=>{ setCount("#meBrkdwn",0); Me_PM(done); });
      }
      function Me_PM(done){
        ZOHO.CREATOR.API.getRecordCount({appName:applicationName, reportName:serviceReport,
          criteria:routeOnlyCrit(`Service_Request_Type=="Routine" && Status=="Closed" && Closed_Owner.ID==${userID} && ${closedDateRangeCrit_ME(periodMe)}`)})
          .then(r=>{ setCount("#mePm",r.result.records_count); Me_Other(done); })
          .catch(()=>{ setCount("#mePm",0); Me_Other(done); });
      }
      function Me_Other(done){
        ZOHO.CREATOR.API.getRecordCount({appName:applicationName, reportName:serviceReport,
          criteria:routeOnlyCrit(`(Service_Request_Type=="One Time Service"||Service_Request_Type=="Repair"||Service_Request_Type=="Inspection") && Status=="Closed" && Closed_Owner.ID==${userID} && ${closedDateRangeCrit_ME(periodMe)}`)})
          .then(r=>{ setCount("#meOther",r.result.records_count); Me_ESN(done); })
          .catch(()=>{ setCount("#meOther",0); Me_ESN(done); });
      }
      // Me ESN — uses Supervisior_Name.ID via baseCrit
      function Me_ESN(done){
        ZOHO.CREATOR.API.getRecordCount({appName:applicationName, reportName:ESNReport,
          criteria:baseCritESN(`ESN_Status=="Completed" && ${addedTimeRangeCrit(periodMe)}`)})
          .then(r=>{ setCount("#meEsn",r.result.records_count); if(done)done(); })
          .catch(()=>{ setCount("#meEsn",0); if(done)done(); });
      }

      /* ─────────────────────────────────────────────────────────
         MODAL
      ───────────────────────────────────────────────────────── */
      function openModal(){
        const st = getState(activeFilterTarget);
        $("#periodSelect").val(st.period);
        const isCustom = st.period === "custom";
        $(".date-range-field").toggle(isCustom);
        $("#dateFrom").val(isCustom ? toInputDate(st.from) : "");
        $("#dateTo").val(isCustom ? toInputDate(st.to) : "");
        $("#filterBackdrop").addClass("show");
        $("#filterModal").addClass("show").attr("aria-hidden","false");
        $("body").addClass("modal-open");
      }
      function closeModal(){
        $("#filterModal").removeClass("show").attr("aria-hidden","true");
        $("#filterBackdrop").removeClass("show");
        $("body").removeClass("modal-open");
        $("#techSuggestions,#routeSuggestions").hide().empty();
      }

      $(document).on("click","#OtherCalls,#esn,#me", function(e){
        e.preventDefault(); e.stopPropagation();
        activeFilterTarget = this.id==="esn" ? "esn" : this.id==="me" ? "me" : "other";
        openModal();
      });
      $(document).on("click","#filterModalClose,#filterBackdrop", closeModal);
      $("#periodSelect").on("change", function(){
        const c = $(this).val()==="custom";
        $(".date-range-field").toggle(c);
        if (!c) $("#dateFrom,#dateTo").val("");
      });
      $("#filterClear").on("click", function(){
        const st = getState(activeFilterTarget);
        st.period="this_month"; st.from=null; st.to=null;
        closeModal(); if(userID) refreshOnly(activeFilterTarget);
      });
      $("#filterApply").on("click", function(){
        const st = getState(activeFilterTarget);
        const p  = $("#periodSelect").val();
        st.period = p;
        if (p==="custom"){
          const f=parseInputDate($("#dateFrom").val());
          const t=parseInputDate($("#dateTo").val());
          if (!f||!t){ alert("Please select both From and To dates."); return; }
          st.from = f<=t?f:t; st.to = f<=t?t:f;
        } else { st.from=null; st.to=null; }
        closeModal(); if(userID) refreshOnly(activeFilterTarget);
      });

      /* ─────────────────────────────────────────────────────────
         TECH & ROUTE SEARCH  (UI wired up — logic for later)
      ───────────────────────────────────────────────────────── */
      function esc2(s){ return String(s||"").replace(/"/g,'\\"'); }
      let techTimer=null, routeTimer=null;

      $("#techSearch").on("input", function(){
        const val = $(this).val().trim(); clearTimeout(techTimer);
        if (!val){ $("#techSuggestions").hide().empty(); return; }
        techTimer = setTimeout(()=>{
          $("#techSuggestions").html('<div class="sugg-empty">Loading...</div>').show();
          ZOHO.CREATOR.API.getAllRecords({ appName:applicationName, reportName:userReport,
            criteria:`(Role=="Service Technician" && User_Status=="Active" && Name.contains("${esc2(val)}"))`, pageSize:50 })
            .then(res=>{
              const rows=res?.data||[];
              if (!rows.length){ $("#techSuggestions").html('<div class="sugg-empty">Not found</div>'); return; }
              $("#techSuggestions").html(rows.map(r=>`<div class="sugg-item" data-value="${esc2(r.Name||"")}">${r.Name||""}</div>`).join("")).show();
            }).catch(()=>$("#techSuggestions").html('<div class="sugg-empty">Error</div>'));
        }, 350);
      });

      $("#routeSearch").on("input", function(){
        const val = $(this).val().trim(); clearTimeout(routeTimer);
        if (!val){ $("#routeSuggestions").hide().empty(); return; }
        routeTimer = setTimeout(()=>{
          $("#routeSuggestions").html('<div class="sugg-empty">Loading...</div>').show();
          ZOHO.CREATOR.API.getAllRecords({ appName:applicationName, reportName:userReport,
            criteria:`(New_Route_Name.contains("${esc2(val)}"))`, pageSize:200 })
            .then(res=>{
              const rows=res?.data||[];
              const map=new Map();
              rows.forEach(r=>{ const v=(r.New_Route_Name||"").trim(); if(v) map.set(v.toLowerCase(),v); });
              const list=Array.from(map.values()).slice(0,50);
              if (!list.length){ $("#routeSuggestions").html('<div class="sugg-empty">Not found</div>'); return; }
              $("#routeSuggestions").html(list.map(v=>`<div class="sugg-item" data-value="${esc2(v)}">${v}</div>`).join("")).show();
            }).catch(()=>$("#routeSuggestions").html('<div class="sugg-empty">Error</div>'));
        }, 300);
      });

      $(document).on("click","#techSuggestions .sugg-item", function(){ $("#techSearch").val($(this).data("value")||""); $("#techSuggestions").hide().empty(); });
      $(document).on("click","#routeSuggestions .sugg-item", function(){ $("#routeSearch").val($(this).data("value")||""); $("#routeSuggestions").hide().empty(); });
      $(document).on("click.sugg", function(e){
        if (!$(e.target).closest("#techSearch,#techSuggestions").length) $("#techSuggestions").hide().empty();
        if (!$(e.target).closest("#routeSearch,#routeSuggestions").length) $("#routeSuggestions").hide().empty();
      });

      /* ─────────────────────────────────────────────────────────
         ZOHO INIT
      ───────────────────────────────────────────────────────── */
      ZOHO.CREATOR.init().then(()=>{
        $("#loader").show();
        initPMPieChart();
        $(".date-range-field").hide();

        const params    = ZOHO.CREATOR.UTIL.getInitParams() || {};
        const loginuser = params.loginUser || "";

        ZOHO.CREATOR.API.getAllRecords({
          appName: applicationName, reportName: userReport,
          criteria: `(Email == "${loginuser}")`, page:1, pageSize:1
        }).then(res=>{
          if (res.data && res.data.length > 0){
            const rec    = res.data[0];
            UserName     = rec.Name || "";
            userID       = rec.ID   || "";
            currentRole  = rec.Role || "";
            currentRoute = fullyDecode(rec.New_Route_Name || rec.Route || rec.Region || "");

            console.log("userID:", userID, "| UserName:", UserName, "| Route:", currentRoute);
            console.log("Expanded routes:", ROUTE_EXPANSION[currentRoute] || "no expansion (single route)");

            $("#user_Role").text(currentRole ? currentRole.substring(0,2).toUpperCase() : "NA");
            $("#User_Route").text(currentRoute || "NA");

            refreshOtherCalls(()=>{
              refreshESN(()=>{
                refreshMe(()=>{
                  bindCountRedirects();
                  $("#loader").hide();
                });
              });
            });
          } else {
            $("#loader").hide();
          }
        }).catch(err=>{ console.error(err); $("#loader").hide(); });
      });

    });
  </script>
</body>
</html>
